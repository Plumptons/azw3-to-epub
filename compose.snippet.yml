# Windows Docker Compose cannot build from a GitHub URL context.
# Clone once next to your compose file, then build from the local folder:
#
#   cd "M:\Docker Compose Files\Core"
#   git clone https://github.com/Plumptons/azw3-to-epub.git
#
# Put secrets in that folder's .env:
#   BINDERY_API_KEY=...
#   STORYTELLER_USERNAME=...
#   STORYTELLER_PASSWORD=...

  azw3-to-epub:
    build:
      context: ./azw3-to-epub/azw3-to-epub
    image: azw3-to-epub:latest
    container_name: azw3-to-epub
    user: "0:0"
    restart: unless-stopped
    environment:
      TZ: Pacific/Auckland
      LIBRARY_DIR: /media/books
      DELETE_SOURCE: "false"
      INITIAL_SCAN: "true"
      BINDERY_URL: http://bindery:8787
      BINDERY_API_KEY: ${BINDERY_API_KEY}
      BINDERY_SYNC: "true"
      BINDERY_LIBRARY_DIR: /media/books
      BINDERY_WANTED_SEARCH: "true"
      BINDERY_SEARCH_INTERVAL: "3600"
      BINDERY_AUDIO_PROBE: "true"
      BINDERY_AUDIO_PROBE_INTERVAL: "3600"
      BINDERY_AUDIO_PROBE_LIMIT: "5"
      FOLDER_COALESCE: "true"
      FOLDER_COALESCE_INTERVAL: "300"
      STORYTELLER_URL: http://storyteller:8001
      STORYTELLER_USERNAME: ${STORYTELLER_USERNAME}
      STORYTELLER_PASSWORD: ${STORYTELLER_PASSWORD}
      STORYTELLER_AUTO_MERGE: "true"
      STORYTELLER_MERGE_INTERVAL: "300"
      EPUB_VERSION: "3"
    volumes:
      - M:/media:/media
